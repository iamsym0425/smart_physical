<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="피지컬스튜디오">
<title>피지컬스튜디오</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Great+Vibes&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'Inter',-apple-system,sans-serif;overflow:hidden;transition:background .3s,color .3s}
input,select,button{font-family:inherit}
button{cursor:pointer;border:none;background:none}
::-webkit-scrollbar{display:none}

/* THEME */
body.light{background:#EEEDE7;color:#111}
body.dark{background:#0C0C0C;color:#E8E8E2}
/* Ambient background blobs */
body::before,body::after{content:'';position:fixed;border-radius:50%;pointer-events:none;z-index:0;transition:opacity .3s}
body.dark::before{width:320px;height:320px;top:-80px;right:-60px;background:radial-gradient(circle,rgba(30,90,255,.12) 0%,transparent 70%);filter:blur(40px)}
body.dark::after{width:260px;height:260px;bottom:120px;left:-80px;background:radial-gradient(circle,rgba(160,40,200,.1) 0%,transparent 70%);filter:blur(50px)}
body.light::before{width:320px;height:320px;top:-80px;right:-60px;background:radial-gradient(circle,rgba(30,144,255,.08) 0%,transparent 70%);filter:blur(40px)}
body.light::after{width:260px;height:260px;bottom:120px;left:-80px;background:radial-gradient(circle,rgba(193,53,132,.07) 0%,transparent 70%);filter:blur(50px)}
/* All content above blobs */
.app{position:relative;z-index:1}
/* Subtle dot grid overlay on main */
.main::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;opacity:.4}
body.light .main::before{background-image:radial-gradient(circle,rgba(0,0,0,.08) 1px,transparent 1px);background-size:24px 24px}
body.dark .main::before{background-image:radial-gradient(circle,rgba(255,255,255,.04) 1px,transparent 1px);background-size:24px 24px}
/* Third accent blob mid-right */
.main::after{content:'';position:absolute;width:200px;height:200px;top:40%;right:-60px;border-radius:50%;pointer-events:none;z-index:0;filter:blur(50px)}
body.dark .main::after{background:radial-gradient(circle,rgba(30,90,255,.08) 0%,transparent 70%)}
body.light .main::after{background:radial-gradient(circle,rgba(138,58,185,.06) 0%,transparent 70%)}
/* Ensure content inside main is above patterns */
.day-view,.pipeline-scroll,.ideas-scroll{position:relative;z-index:1}
body.light .s1{background:#FFF;border:1px solid rgba(0,0,0,.08)}
body.dark .s1{background:#181818;border:1px solid rgba(255,255,255,.07)}
body.light .s2{background:#F5F4EE;border:1px solid rgba(0,0,0,.06)}
body.dark .s2{background:#121212;border:1px solid rgba(255,255,255,.05)}
body.light .mu{color:#A8A6A0}
body.dark .mu{color:#4E4E4A}
body.light .mu2{color:#666}
body.dark .mu2{color:#6A6A66}
body.light input,body.light select{background:#FFF;border:1.5px solid #E5E4DE;color:#111}
body.dark input,body.dark select{background:#1E1E1E;border:1.5px solid #2C2C2C;color:#E8E8E2}
input:focus,select:focus{outline:none}
body.light input:focus{border-color:#333}
body.dark input:focus{border-color:#666}
body.light .btn-p{background:#111;color:#FFF}
body.dark .btn-p{background:#E8E8E2;color:#111}
body.light .btn-g{background:#E8E7E1;color:#555}
body.dark .btn-g{background:#1E1E1E;color:#666;border:1px solid #2A2A2A}
body.light .divline{border-bottom:1px solid rgba(0,0,0,.06)}
body.dark .divline{border-bottom:1px solid rgba(255,255,255,.04)}
body.light .sheet-bg{background:#FFF}
body.dark .sheet-bg{background:#161616}
body.light .handle-c{background:#DDD}
body.dark .handle-c{background:#303030}
body.light .dim-bg{background:rgba(0,0,0,.44)}
body.dark .dim-bg{background:rgba(0,0,0,.72)}
body.light .today-pill{background:#111;color:#FFF}
body.dark .today-pill{background:#E8E8E2;color:#111}
body.light .glass{background:rgba(238,237,231,.92);border-top:1px solid rgba(0,0,0,.06)}
body.dark .glass{background:rgba(12,12,12,.92);border-top:1px solid rgba(255,255,255,.05)}
body.light .no-item{color:#B8B7B1;border:1px dashed #DDDCD7;border-radius:16px}
body.dark .no-item{color:#504E4A;border:1px dashed #333;border-radius:16px}
body.light .tool-chip{background:#EEEDE7;color:#777}
body.dark .tool-chip{background:#282824;color:#6A6A64}
body.light .idea-box{background:#F5F4EE;border:1px solid rgba(0,0,0,.06)}
body.dark .idea-box{background:#131313;border:1px solid rgba(255,255,255,.05)}

/* SHELL */
.app{max-width:430px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative}
/* Truly frozen header - position fixed */
#R-fixed{position:fixed;top:0;left:0;right:0;max-width:430px;margin:0 auto;z-index:30;backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%)}
body.light #R-fixed{background:rgba(238,237,231,.88)}
body.dark #R-fixed{background:rgba(10,10,10,.88)}
/* Trim accent line at bottom of header */
#R-fixed::after{content:'';position:absolute;bottom:0;left:20px;right:20px;height:1px;background:linear-gradient(90deg,transparent,rgba(30,144,255,.3) 30%,rgba(160,40,200,.3) 70%,transparent)}
body.light #R-fixed::after{background:linear-gradient(90deg,transparent,rgba(30,144,255,.2) 30%,rgba(193,53,132,.2) 70%,transparent)}
/* R-main must account for the fixed header height via padding-top set dynamically */
.main{flex:1;overflow:hidden;position:relative}
#R-topbar,#R-metrics{flex-shrink:0!important;flex-grow:0!important}

/* TOPBAR */
.topbar{padding:52px 20px 8px;flex-shrink:0}
.tb{display:flex;align-items:center;justify-content:space-between;gap:6px;min-width:0}
.app-name{display:flex;flex-direction:column;gap:0px;line-height:1;flex-shrink:0}
.logo-bright{font-family:'Great Vibes',cursive;font-size:26px;font-weight:400;background:linear-gradient(90deg,#1E90FF 0%,#00BFFF 60%,#FFD700 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.5px;line-height:1.1;filter:drop-shadow(0 0 10px rgba(30,144,255,.3))}
.logo-smart{font-family:'Inter',sans-serif;font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap}
body.light .logo-smart{color:#1E90FF}
body.dark .logo-smart{color:#4AABFF}
.tb-r{display:flex;gap:6px;align-items:center;flex-shrink:0}
.icon-btn{width:36px;height:36px;border-radius:18px;font-size:15px;display:flex;align-items:center;justify-content:center}
.fab{width:36px;height:36px;border-radius:18px;font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1}

/* METRICS */
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:10px 16px;flex-shrink:0}
.mc{border-radius:14px;padding:10px 10px;display:flex;align-items:center;gap:7px;cursor:pointer;transition:transform .12s;min-width:0;overflow:hidden}
.mc:active{transform:scale(.95)}
.mc-icon{font-size:17px;line-height:1;flex-shrink:0}
.mc-val{font-size:20px;font-weight:900;letter-spacing:-1px;color:#FFF;line-height:1}
.mc-lbl{font-size:9px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:rgba(255,255,255,.68);margin-top:2px}
.mc-body{display:flex;flex-direction:column;min-width:0}
.mc-a{background:linear-gradient(140deg,#0A7A52,#0E9464)}
.mc-b{background:linear-gradient(140deg,#1555B0,#2272D4)}
.mc-c{background:linear-gradient(140deg,#A85C10,#D07020)}
.mc-d{background:linear-gradient(140deg,#7828A0,#A838C8)}

/* BOTTOM TABS */
.bottom-tabs{flex-shrink:0;display:flex;padding:8px 16px 34px;backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);position:relative}
body.light .bottom-tabs{border-top:1px solid rgba(0,0,0,.07)}
body.dark .bottom-tabs{border-top:1px solid rgba(255,255,255,.05)}
.bottom-tabs::before{content:"";position:absolute;top:0;left:20px;right:20px;height:1px;background:linear-gradient(90deg,transparent,rgba(14,148,100,.45) 30%,rgba(34,114,212,.45) 70%,transparent)}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0;border-radius:14px;background:none;border:none;transition:transform .1s}
.btab:active{transform:scale(.88)}
.btab-svg{width:24px;height:24px;transition:color .2s}
.btab-lbl{font-size:10px;font-weight:700;letter-spacing:.1px;transition:color .2s}
/* Active tab colors */
.btab-cal-on{color:#0E9464}
.btab-pipe-on{color:#2272D4}
.btab-idea-on{color:#A838C8}
/* Inactive */
body.light .btab-off{color:#C8C7C1}
body.dark .btab-off{color:#323230}

/* MAIN */
.main{flex:1;overflow:hidden;position:relative}
@keyframes slideUpIn{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
.tab-enter{animation:slideUpIn .3s cubic-bezier(.4,0,.2,1)}

/* STATS PAGE */
.stats-overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;max-width:430px;margin:0 auto}
body.light .stats-overlay{background:#EEEDE7}
body.dark .stats-overlay{background:#0C0C0C}
.stats-topbar{padding:52px 20px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.stats-title{font-size:20px;font-weight:900;letter-spacing:-.6px}
.stats-close{width:36px;height:36px;border-radius:18px;font-size:18px;display:flex;align-items:center;justify-content:center}
.stats-scroll{flex:1;overflow-y:auto;padding:0 20px 40px;-webkit-overflow-scrolling:touch}
.stats-scroll::-webkit-scrollbar{display:none}
.stats-section{margin-bottom:28px}
.stats-section-lbl{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-card{border-radius:18px;padding:16px 14px;display:flex;flex-direction:column;gap:4px}
.stat-card-val{font-size:30px;font-weight:900;letter-spacing:-1.5px;line-height:1}
.stat-card-lbl{font-size:11px;font-weight:700;letter-spacing:.2px;opacity:.7}
.stat-bar-row{margin-bottom:12px}
.stat-bar-label{display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px;font-weight:600}
.stat-bar-track{height:8px;border-radius:4px;overflow:hidden}
body.light .stat-bar-track{background:#E8E7E1}
body.dark .stat-bar-track{background:#222}
.stat-bar-fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.stat-type-row{display:flex;align-items:center;gap:10px;padding:10px 0}
.stat-type-dot{width:10px;height:10px;border-radius:5px;flex-shrink:0}
.stat-type-name{flex:1;font-size:13px;font-weight:600}
.stat-type-cnt{font-size:13px;font-weight:800}
.stat-type-bar-wrap{width:80px;height:6px;border-radius:3px;overflow:hidden}
body.light .stat-type-bar-wrap{background:#E8E7E1}
body.dark .stat-type-bar-wrap{background:#222}
.weekly-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.week-col{display:flex;flex-direction:column;align-items:center;gap:4px}
.week-col-day{font-size:9px;font-weight:800;letter-spacing:.3px;text-transform:uppercase}
.week-col-bar-wrap{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:60px;border-radius:6px}
body.light .week-col-bar-wrap{background:#E8E7E1}
body.dark .week-col-bar-wrap{background:#1E1E1A}
.week-col-bar{width:100%;border-radius:6px;transition:height .4s cubic-bezier(.4,0,.2,1)}
.week-col-cnt{font-size:10px;font-weight:700}
body.light .week-col-cnt{color:#888}
body.dark .week-col-cnt{color:#555}
/* Stats btn */
.stats-btn{width:34px;height:34px;border-radius:17px;font-size:14px;display:flex;align-items:center;justify-content:center;border:none}
body.light .stats-btn{background:#E8E7E1;color:#444}
body.dark .stats-btn{background:#1E1E1E;color:#888;border:1px solid #2A2A2A}

/* ─ CALENDAR VIEW ─ */
.calv-overlay{position:fixed;inset:0;z-index:200;max-width:430px;margin:0 auto;display:flex;flex-direction:column}
body.light .calv-overlay{background:#EEEDE7}
body.dark .calv-overlay{background:#0C0C0C}
.calv-topbar{padding:52px 20px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.calv-title{font-size:18px;font-weight:900;letter-spacing:-.5px}
.calv-close{width:34px;height:34px;border-radius:17px;font-size:16px;display:flex;align-items:center;justify-content:center;border:none;flex-shrink:0}
.calv-week-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 20px 0;flex-shrink:0}
.calv-week-lbl{font-size:14px;font-weight:700;letter-spacing:-.3px}
.calv-nav-btn{width:32px;height:32px;border-radius:16px;font-size:16px;display:flex;align-items:center;justify-content:center;border:none}
body.light .calv-nav-btn{background:#E8E7E1;color:#555}
body.dark .calv-nav-btn{background:#1E1E1E;color:#777}
/* Day header row */
.calv-header{display:flex;flex-shrink:0;border-bottom:1px solid;margin-top:10px}
body.light .calv-header{border-color:rgba(0,0,0,.08)}
body.dark .calv-header{border-color:rgba(255,255,255,.06)}
.calv-time-gutter{width:52px;flex-shrink:0}
.calv-day-headers{flex:1;display:grid;grid-template-columns:repeat(7,1fr)}
.calv-day-hd{display:flex;flex-direction:column;align-items:center;padding:8px 2px;gap:3px}
.calv-day-dow{font-size:9px;font-weight:800;letter-spacing:.4px;text-transform:uppercase}
body.light .calv-day-dow{color:#AAA}
body.dark .calv-day-dow{color:#555}
.calv-day-num{width:30px;height:30px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800}
body.light .calv-today-num{background:#111;color:#FFF}
body.dark .calv-today-num{background:#EEE;color:#111}
/* Time grid */
.calv-grid-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative}
.calv-grid-scroll::-webkit-scrollbar{display:none}
.calv-grid-inner{display:flex;position:relative}
.calv-time-labels{width:52px;flex-shrink:0;position:relative}
.calv-time-lbl{height:72px;display:flex;align-items:flex-start;justify-content:flex-end;padding-right:8px;padding-top:3px;font-size:11px;font-weight:600;flex-shrink:0}
body.light .calv-time-lbl{color:#BBB}
body.dark .calv-time-lbl{color:#444}
.calv-events-area{flex:1;position:relative}
.calv-hour-lines{position:absolute;inset:0;pointer-events:none}
.calv-hour-line{position:absolute;left:0;right:0;height:1px}
body.light .calv-hour-line{background:rgba(0,0,0,.06)}
body.dark .calv-hour-line{background:rgba(255,255,255,.05)}
.calv-day-cols{display:grid;grid-template-columns:repeat(7,1fr);position:absolute;inset:0}
.calv-day-col{position:relative;border-left:1px solid}
body.light .calv-day-col{border-color:rgba(0,0,0,.05)}
body.dark .calv-day-col{border-color:rgba(255,255,255,.04)}
.calv-event{position:absolute;left:1px;right:1px;border-radius:8px;padding:5px 7px;overflow:hidden;cursor:pointer;z-index:2;box-shadow:0 1px 4px rgba(0,0,0,.12)}
.calv-event-type{font-size:9px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;opacity:.75;line-height:1.3;margin-bottom:2px}
.calv-event-title{font-size:11px;font-weight:700;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

/* ─ FILTER OVERLAY ─ */
.filter-overlay{position:fixed;inset:0;z-index:210;display:flex;align-items:flex-end;justify-content:center}
.filter-sheet{width:100%;max-width:430px;max-height:75vh;border-radius:24px 24px 0 0;overflow:hidden;display:flex;flex-direction:column}
body.light .filter-sheet{background:#FFF}
body.dark .filter-sheet{background:#161616}
.filter-header{padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.filter-title{font-size:16px;font-weight:800;letter-spacing:-.4px}
.filter-scroll{overflow-y:auto;padding:0 20px 32px;-webkit-overflow-scrolling:touch}
.filter-scroll::-webkit-scrollbar{display:none}
.filter-row{display:flex;align-items:center;gap:10px;padding:14px 0;cursor:pointer;border-bottom:1px solid}
body.light .filter-row{border-color:rgba(0,0,0,.06)}
body.dark .filter-row{border-color:rgba(255,255,255,.04)}
.filter-row:active{opacity:.7}
.filter-dot{width:10px;height:10px;border-radius:5px;flex-shrink:0}
.filter-row-body{flex:1;min-width:0}
.filter-row-title{font-size:15px;font-weight:700;letter-spacing:-.3px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.filter-row-meta{font-size:12px;font-weight:500;margin-top:0}
.filter-row-badge{padding:7px 14px;border-radius:12px;font-size:13px;font-weight:800;white-space:nowrap;flex-shrink:0;letter-spacing:-.2px}

/* DATE STRIP */
.date-strip-wrap{padding:4px 20px 6px;flex-shrink:0}
.date-strip{display:flex;gap:6px;overflow-x:auto;padding:2px 0;-webkit-overflow-scrolling:touch}
.date-strip::-webkit-scrollbar{display:none}
.dpill{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 10px;border-radius:16px;cursor:pointer;flex-shrink:0;min-width:46px;transition:transform .1s,background .15s}
.dpill:active{transform:scale(.9)}
.dpill-dow{font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
.dpill-num{font-size:17px;font-weight:800;letter-spacing:-.4px}
.dpill-dot{width:5px;height:5px;border-radius:3px;margin-top:1px}
body.light .dpill{color:#B0AFA9}
body.dark .dpill{color:#484844}
body.light .dpill.sel{background:#111;color:#FFF}
body.dark .dpill.sel{background:#E8E8E2;color:#111}
body.light .dpill.sel .dpill-dow{color:rgba(255,255,255,.6)}
body.dark .dpill.sel .dpill-dow{color:rgba(0,0,0,.45)}
body.light .dpill.has-c{color:#444}
body.dark .dpill.has-c{color:#888}
body.light .dpill.wkend:not(.sel){color:#E05040}
body.dark .dpill.wkend:not(.sel){color:#A84038}
body.light .dpill.sat:not(.sel){color:#2878D4}
body.dark .dpill.sat:not(.sel){color:#1A60C0}

/* DAY VIEW */
.day-view{height:100%;display:flex;flex-direction:column}
.day-label-row{display:flex;align-items:baseline;justify-content:space-between;padding:2px 20px 8px;flex-shrink:0}
.day-label-main{font-size:17px;font-weight:800;letter-spacing:-.5px}
.day-label-count{font-size:12px;font-weight:600}
.pages-wrap{flex:1;overflow:hidden}
.pages-scroll{display:flex;height:100%;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.pages-scroll::-webkit-scrollbar{display:none}
.day-page{min-width:100%;height:100%;scroll-snap-align:start;overflow-y:auto;padding:0 20px 16px;-webkit-overflow-scrolling:touch;flex-shrink:0}
.day-page::-webkit-scrollbar{display:none}
.day-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:55%;gap:10px}
.day-empty-icon{font-size:48px;opacity:.25}
.day-empty-txt{font-size:14px;font-weight:600}

/* SWIPEABLE CARD */
.sw-wrap{position:relative;border-radius:18px;margin-bottom:10px;overflow:hidden;transform:translateZ(0)}
.sw-right-bg{position:absolute;left:0;top:0;bottom:0;right:0;border-radius:18px;display:flex;align-items:center;padding-left:20px;will-change:auto}
.sw-left-bg{position:absolute;right:0;top:0;bottom:0;display:flex;border-radius:0 18px 18px 0;will-change:auto}
.sw-action{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;width:68px;flex-shrink:0}
.sw-action-icon{font-size:22px;line-height:1}
.sw-action-lbl{font-size:9px;font-weight:800;color:#FFF;letter-spacing:.3px}
.sw-card{position:relative;z-index:2;border-radius:18px;padding:14px 15px;cursor:pointer;border:1px solid transparent;touch-action:pan-y;will-change:transform;-webkit-backface-visibility:hidden;backface-visibility:hidden;transform:translateZ(0)}
.sw-card:active{opacity:.95}

/* CARD CONTENT */
.cc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px}
.cc-type{font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;opacity:.65}
.cc-pin{font-size:13px;line-height:1}
.cc-time{font-size:11px;font-weight:600;opacity:.55}
.cc-title{font-size:16px;font-weight:800;letter-spacing:-.4px;line-height:1.3;margin-bottom:10px}

/* ─── HAPTIC ─── */
function haptic(t){
  if(navigator.vibrate){
    ({
      light:  ()=>navigator.vibrate(6),
      tap:    ()=>navigator.vibrate([10,0]),
      medium: ()=>navigator.vibrate(18),
      save:   ()=>navigator.vibrate([12,6,12]),
      heavy:  ()=>navigator.vibrate(40),
      success:()=>navigator.vibrate([10,5,22]),
      error:  ()=>navigator.vibrate([25,10,25]),
    }[t]||Function())();
    return;
  }
  // iOS: AudioContext oscillator click — subtle tactile feel via speaker
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const patterns={
      light:  [{f:1200,d:.008,g:.12,dl:0}],
      tap:    [{f:1000,d:.010,g:.18,dl:0}],
      medium: [{f:900, d:.016,g:.22,dl:0}],
      save:   [{f:1000,d:.010,g:.20,dl:0},{f:1300,d:.010,g:.24,dl:.05}],
      heavy:  [{f:500, d:.035,g:.30,dl:0}],
      success:[{f:900, d:.010,g:.18,dl:0},{f:1400,d:.022,g:.28,dl:.06}],
      error:  [{f:280, d:.028,g:.28,dl:0},{f:280, d:.028,g:.28,dl:.09}],
    };
    (patterns[t]||patterns.tap).forEach(({f,d,g,dl})=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=f;osc.type="sine";
      const t0=ctx.currentTime+dl;
      gain.gain.setValueAtTime(0,t0);
      gain.gain.linearRampToValueAtTime(g,t0+.002);
      gain.gain.exponentialRampToValueAtTime(.0001,t0+d);
      osc.start(t0);osc.stop(t0+d+.01);
    });
    setTimeout(()=>ctx.close(),600);
  }catch(e){}
}

/* ─── DAY VIEW ─── */
function rDayView(container){
  const dates=getDateRange();
  const selIdx=Math.max(0,dates.indexOf(S.selDate));

  const strip=dates.map(ds=>{
    const d=new Date(ds+"T00:00:00"),dow=d.getDay();
    const isSel=ds===S.selDate,hasC=S.posts.some(p=>p.date===ds);
    const isWkend=dow===0||dow===6;
    const isHol=HOLIDAYS.has(ds);
    const isRed=dow===0||isHol;
    let cls="dpill"+(isSel?" sel":"")+(hasC&&!isSel?" has-c":"")+(isRed&&!isSel?" wkend":"")+(dow===6&&!isSel&&!isRed?" sat":"");
    const dotC=hasC?(isRed?"#E05040":dow===6?"#2878D4":ct(S.posts.find(p=>p.date===ds)?.type||"shorts").color):"transparent";
    return `<div class="${cls}" data-ds="${ds}">
      <span class="dpill-dow">${WDAYS[(dow+6)%7]}</span>
      <span class="dpill-num">${d.getDate()}</span>
      <div class="dpill-dot" style="background:${dotC}"></div>
    </div>`;
  }).join("");

  // Window of pages ±8
  const wStart=Math.max(0,selIdx-8),wEnd=Math.min(dates.length-1,selIdx+20);
  const pages=dates.slice(wStart,wEnd+1).map(ds=>{
    const dp=S.posts.filter(p=>p.date===ds).sort((a,b)=>{
      if(a.pinned!==b.pinned)return a.pinned?-1:1;
      return ct(a.type).order-ct(b.type).order;
    });
    const cards=dp.length?dp.map(p=>buildCard(p)).join(""):`<div class="day-empty"><div class="day-empty-icon">🎯</div><div class="day-empty-txt mu">콘텐츠 없음</div></div>`;
    return `<div class="day-page" data-page-ds="${ds}">${cards}<button class="add-day-btn" data-add-date="${ds}">+ 콘텐츠 추가</button></div>`;
  }).join("");

  const selD=new Date(S.selDate+"T00:00:00");
  const isToday=S.selDate===fmt(TODAY);
  const dayLbl=isToday?`오늘 · ${selD.getMonth()+1}월 ${selD.getDate()}일`:`${selD.getMonth()+1}월 ${selD.getDate()}일 ${["일","월","화","수","목","금","토"][selD.getDay()]}요일`;

  </div>`;

  requestAnimationFrame(()=>{
    // Scroll date strip to selected
    const dsEl=document.getElementById("ds");
    dsEl?.querySelector(".sel")?.scrollIntoView({inline:"center",behavior:"smooth"});
    // Scroll pages to selected
    const psEl=document.getElementById("ps");
    const selPage=psEl?.querySelector(`[data-page-ds="${S.selDate}"]`);
    if(selPage&&psEl)psEl.scrollLeft=selPage.offsetLeft;

    // Date pill click — smooth scroll only, no full re-render
    document.querySelectorAll("[data-ds]").forEach(el=>el.addEventListener("click",()=>{
      haptic("light");
      const newDs=el.dataset.ds;
      if(newDs===S.selDate)return;
      S.selDate=newDs;save();

      // Update pill styles in place
      const dsEl=document.getElementById("ds");
      dsEl?.querySelectorAll("[data-ds]").forEach(pill=>{
        const ds2=pill.dataset.ds;
        const isSel=ds2===S.selDate;
        const d2=new Date(ds2+"T00:00:00"),dow2=d2.getDay();
        const hasC=S.posts.some(p=>p.date===ds2);
        const isRed=dow2===0||HOLIDAYS.has(ds2),isSat=dow2===6;
        pill.className="dpill"+(isSel?" sel":"")+(hasC&&!isSel?" has-c":"")+(isRed&&!isSel?" wkend":"")+(isSat&&!isSel&&!isRed?" sat":"");
      });
      // Smooth scroll selected pill to center
      dsEl?.querySelector(".sel")?.scrollIntoView({inline:"center",behavior:"smooth"});

      // Smooth scroll the pages panel to the selected day
      const psEl=document.getElementById("ps");
      const selPage=psEl?.querySelector(`[data-page-ds="${S.selDate}"]`);
      if(selPage&&psEl)psEl.scrollTo({left:selPage.offsetLeft,behavior:"smooth"});

      // Update day label text
      const d=new Date(S.selDate+"T00:00:00");

            el.className="dpill"+(isSel?" sel":"")+(hasC&&!isSel?" has-c":"")+(isWkend&&!isSel?" wkend":"");
          });
          dsEl?.querySelector(".sel")?.scrollIntoView({inline:"center",behavior:"smooth"});
          // Update label

/* ─── SWIPE ATTACH ─── */
let openSwipeWrap=null;
function attachCardSwipe(wrap,card,onAdvance,onPin,onDuplicate,onDelete){
  let sx=0,sy=0,cx=0,dir=null,active=false;
  const RTHRESH=72,LSNAP=196,LFULL=260;
  // Rubber-band damping
  const damp=(v,max)=>v>0?Math.min(v,max+Math.sqrt(Math.max(0,v-max))*6):Math.max(v,-max-Math.sqrt(Math.max(0,-v-max))*6);

  card.addEventListener("touchstart",e=>{
    if(openSwipeWrap&&openSwipeWrap!==wrap){snapBack(openSwipeWrap.querySelector(".sw-card"));openSwipeWrap=null;}
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;dir=null;cx=0;active=true;
    card.style.transition="none";
    card.style.willChange="transform";
  },{passive:true});

  window.addEventListener("touchmove",e=>{
    if(!active)return;
    const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
    if(!dir){
      if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>6)dir="h";
      else if(Math.abs(dy)>6){dir="v";active=false;return;}
      else return;
    }
    if(dir==="h"){
      e.preventDefault();
      cx=damp(dx,cx>0?RTHRESH:LFULL);
      card.style.transform=`translate3d(${cx}px,0,0)`;
    }
  },{passive:false});

  window.addEventListener("touchend",()=>{
    if(!active)return;active=false;
    card.style.willChange="auto";
    card.style.transition="transform .26s cubic-bezier(.25,.46,.45,.94)";
    if(cx>RTHRESH){
      haptic("success");
      card.style.transform="translate3d(110%,0,0)";
      setTimeout(()=>{snapBack(card);onAdvance();},240);
    }else if(cx<-LFULL){
      haptic("error");
      card.style.transform="translate3d(-110%,0,0)";
      setTimeout(()=>{onDelete();},200);
    }else if(cx<-LSNAP+24){
      card.style.transform=`translate3d(-${LSNAP}px,0,0)`;
      openSwipeWrap=wrap;
      wrap.querySelector(`[data-sw-pin]`)?.addEventListener("click",()=>{snapBack(card);openSwipeWrap=null;onPin();},{once:true});
      wrap.querySelector(`[data-sw-dup]`)?.addEventListener("click",()=>{snapBack(card);openSwipeWrap=null;onDuplicate();},{once:true});
      wrap.querySelector(`[data-sw-del]`)?.addEventListener("click",()=>{onDelete();},{once:true});
    }else{
      snapBack(card);
    }
  },{passive:true});
}

function snapBack(card){
  if(card){
    card.style.transition="transform .22s cubic-bezier(.25,.46,.45,.94)";
    card.style.transform="translate3d(0,0,0)";
  }
}

/* ─── IDEA ACTIONS ─── */
function addIdea(){
  if(!S.newIdeaTxt.trim())return;
  // Read current textarea values before state reset
  const txt=document.getElementById("ia-inp")?.value||S.newIdeaTxt;
  const memo=document.getElementById("ia-memo")?.value||S.newIdeaMemo;
  haptic("save");
  S.ideas.push({id:S.nextId++,text:txt.trim(),type:S.newIdeaType,memo:memo.trim()});
  S.newIdeaTxt="";S.newIdeaMemo="";
  save();toast("💡 아이디어 저장됐어요");rMetrics();rIdeas();
}

/* ─── POST ACTIONS ─── */
function advanceStatus(id){
  const p=S.posts.find(x=>x.id===id);if(!p)return;
  const prev=p.status;p.status=nextSt(p.status);save();
  if(p.status==="done"&&prev!=="done"){haptic("success");toast(`🎉 ${ct(p.type).short} 완료!`);}
  else{haptic("light");toast(`⏭ ${st(p.status).label}로 변경됐어요`);}
  rMain();rMetrics();
}

function togglePin(id){
  const p=S.posts.find(x=>x.id===id);if(!p)return;
  p.pinned=!p.pinned;save();haptic("medium");
  toast(p.pinned?"📌 고정됐어요":"📌 고정 해제됐어요");rMain();
}

function duplicatePost(id){
  const p=S.posts.find(x=>x.id===id);if(!p)return;
  const d=new Date(p.date+"T00:00:00");d.setDate(d.getDate()+7);
  S.posts.push({...p,id:S.nextId++,date:fmt(d),status:"idea",pinned:false,title:p.title+" (복사)"});
  save();haptic("medium");toast("📋 다음주 같은 날로 복사됐어요");rMain();rMetrics();
}

function deletePost(id){
  S.posts=S.posts.filter(p=>p.id!==id);save();haptic("heavy");toast("🗑️ 삭제됐어요");rMain();rMetrics();
}

/* ─── MODAL ─── */
function openModal(mode,post){
  S.modal={mode,post};rModal();document.body.style.overflow="hidden";
}
function closeModal(cancelled=false){
  if(cancelled&&pendingIdea){
    S.ideas=[...S.ideas,pendingIdea].sort((a,b)=>a.id-b.id);save();
    if(S.tab===2)rIdeas();
  }
  pendingIdea=null;S.modal=null;document.body.style.overflow="";
  rModal();rMetrics();
  // Real-time refresh filter if open
  if(S._filterRefresh){
    S._filterRefresh();
  }else{
    if(S.tab===0)rDayView(document.getElementById("R-main"));
    else if(S.tab===1)rPipeline(document.getElementById("R-main"));
  }
}

function saveModal(){
  const p=S.modal.post;
  p.title=document.getElementById("m-title")?.value||"";
  p.type=document.getElementById("m-type")?.value||p.type;
  const prevSt=S.modal.mode==="edit"?S.posts.find(x=>x.id===p.id)?.status:null;
  p.status=document.getElementById("m-status")?.value||p.status;
  p.date=document.getElementById("m-date")?.value||p.date;
  p.time=document.getElementById("m-time")?.value||p.time;
  p.memo=document.getElementById("m-memo")?.value||"";
  p.aiVoice=document.getElementById("m-ai")?.checked||false;
  if(!p.title.trim()){toast("⚠️ 제목을 입력해주세요");return;}
  const justDone=p.status==="done"&&prevSt!=="done";
  if(S.modal.mode==="add")S.posts.push({...p,id:S.nextId++});
  else S.posts=S.posts.map(x=>x.id===p.id?p:x);
  pendingIdea=null;S.modal=null;document.body.style.overflow="";
  save();rModal();rMetrics();
  if(justDone){haptic("success");toast(`🎉 ${ct(p.type).short} 업로드 완료!`);}else{haptic("save");toast("✓ 저장됐어요");}
  // Real-time refresh filter if open, otherwise full re-render
  if(S._filterRefresh){
    S._filterRefresh();
    rMain(); // also update day view in background
  }else{
    rMain();if(S.tab===2)rIdeas();
  }
}

/* ─── ROUTINE ─── */
function applyRoutine(){
  document.querySelectorAll("[data-rt-type]").forEach(el=>{S.routine[+el.dataset.rtType].type=el.value;});
  document.querySelectorAll("[data-rt-time]").forEach(el=>{S.routine[+el.dataset.rtTime].time=el.value;});
  const now=new Date(TODAY),day=now.getDay(),monday=new Date(now);
  monday.setDate(now.getDate()-((day+6)%7)+7);
  const added=[];
  for(let w=0;w<2;w++){for(let d=0;d<7;d++){
    const r=S.routine[d];if(r.type===RT_NONE)continue;
    const date=new Date(monday);date.setDate(monday.getDate()+w*7+d);
    const ds=fmt(date);
    if(!S.posts.find(p=>p.date===ds&&p.type===r.type)){
      const c=ct(r.type);added.push({id:S.nextId++,type:r.type,title:`${c.label} — ${ds.slice(5).replace("-","/")}`,status:"idea",date:ds,time:r.time,memo:"루틴 자동생성",aiVoice:c.aiDef,pinned:false});
    }
  }}
  if(!added.length){toast("⚠️ 이미 같은 타입이 있어요");return;}
  S.posts=[...S.posts,...added];S.selDate=fmt(monday);S.tab=0;
  save();haptic("success");toast(`🗓️ ${added.length}개 자동 추가됐어요`);
  rMetrics();rMain();rTabs();
}

function calcStreak(){
  let streak=0,d=new Date(TODAY);
  while(true){
    const ds=fmt(d);
    if(S.posts.some(p=>p.date===ds&&p.status==="done")){streak++;d.setDate(d.getDate()-1);}
    else break;
  }
  return streak;
}

/* ─── CALENDAR VIEW ─── */
const HOUR_H=72,CAL_START=6,CAL_END=23;
let calViewWeekStart=null;

/* 한국 공휴일 2025-2026 */
const HOLIDAYS=new Set([
  "2025-01-01","2025-01-28","2025-01-29","2025-01-30",
  "2025-03-01","2025-05-05","2025-06-06","2025-08-15",
  "2025-10-03","2025-10-05","2025-10-06","2025-10-07","2025-10-09",
  "2025-12-25",
  "2026-01-01","2026-02-16","2026-02-17","2026-02-18",
  "2026-03-01","2026-05-05","2026-05-24","2026-06-06","2026-08-15",
  "2026-09-24","2026-09-25","2026-09-26",
  "2026-10-03","2026-10-09","2026-12-25",
]);

function getWeekStart(base){
  const d=new Date(base),day=d.getDay(),mon=new Date(d);
  mon.setDate(d.getDate()-((day+6)%7));mon.setHours(0,0,0,0);return mon;
}

function openCalView(){
  haptic("medium");
  if(!calViewWeekStart)calViewWeekStart=getWeekStart(new Date(S.selDate));
  if(document.getElementById("calv-root")){return;}
  const root=document.getElementById("R-modal");
  const div=document.createElement("div");
  div.id="calv-root";
  const hours=Array.from({length:CAL_END-CAL_START},(_,i)=>CAL_START+i);
  const totalH=hours.length*HOUR_H;
  const timeLbls=hours.map(h=>`<div class="calv-time-lbl">${String(h).padStart(2,"0")}:00</div>`).join("");
  const hLines=hours.map((_,i)=>`<div class="calv-hour-line" style="top:${i*HOUR_H}px"></div>`).join("");

  div.innerHTML=`<div class="calv-overlay" id="calv-overlay" style="transform:translateY(100%);transition:transform .36s cubic-bezier(.4,0,.2,1)">
    <div class="calv-topbar">
      <div class="calv-title">모아보기</div>
      <button class="calv-close btn-g" id="calv-close">✕</button>
    </div>
    <div class="calv-week-nav">
      <button class="calv-nav-btn btn-g" id="calv-prev">‹</button>
      <span class="calv-week-lbl" id="calv-week-lbl"></span>
      <button class="calv-nav-btn btn-g" id="calv-next">›</button>
    </div>
    <div class="calv-header" id="calv-header-row">
      <div class="calv-time-gutter"></div>
      <div class="calv-day-headers" id="calv-day-hds"></div>
    </div>
    <div class="calv-grid-scroll" id="calv-scroll">
      <div class="calv-grid-inner">
        <div class="calv-time-labels">${timeLbls}</div>
        <div class="calv-events-area" style="height:${totalH}px;position:relative" id="calv-events-area">
          <div class="calv-hour-lines">${hLines}</div>
          <div class="calv-day-cols" id="calv-day-cols"></div>
        </div>
      </div>
    </div>
  </div>`;
  root.appendChild(div);

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.getElementById("calv-overlay").style.transform="translateY(0)";
    updateCalContent(0);
    setTimeout(()=>{
      const s=document.getElementById("calv-scroll");
      if(s)s.scrollTop=(8-CAL_START)*HOUR_H;
    },380);
  }));

  document.getElementById("calv-close").addEventListener("click",()=>{
    haptic("light");const ov=document.getElementById("calv-overlay");
    ov.style.transform="translateY(100%)";
    setTimeout(()=>document.getElementById("calv-root")?.remove(),380);
  });
  document.getElementById("calv-prev").addEventListener("click",()=>{
    haptic("light");
    calViewWeekStart=new Date(calViewWeekStart);
    calViewWeekStart.setDate(calViewWeekStart.getDate()-7);
    updateCalContent(-1);
  });
  document.getElementById("calv-next").addEventListener("click",()=>{
    haptic("light");
    calViewWeekStart=new Date(calViewWeekStart);
    calViewWeekStart.setDate(calViewWeekStart.getDate()+7);
    updateCalContent(1);
  });

  // Touch swipe on grid → navigate weeks
  const scroll=document.getElementById("calv-scroll");
  let csx=0,csy=0,cdir=null,cactive=false;
  scroll.addEventListener("touchstart",e=>{csx=e.touches[0].clientX;csy=e.touches[0].clientY;cdir=null;cactive=true;},{passive:true});
  scroll.addEventListener("touchmove",e=>{
    if(!cactive)return;
    const dx=e.touches[0].clientX-csx,dy=e.touches[0].clientY-csy;
    if(!cdir){if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>12)cdir="h";else if(Math.abs(dy)>12){cdir="v";cactive=false;}}
  },{passive:true});
  scroll.addEventListener("touchend",e=>{
    if(!cactive||cdir!=="h")return;
    cactive=false;
    const dx=e.changedTouches[0].clientX-csx;
    if(Math.abs(dx)>55){
      haptic("light");
      calViewWeekStart=new Date(calViewWeekStart);
      calViewWeekStart.setDate(calViewWeekStart.getDate()+(dx<0?7:-7));
      updateCalContent(dx<0?1:-1);
    }
  },{passive:true});
}

function updateCalContent(dir){
  const ws=calViewWeekStart;
  const days=Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(ws.getDate()+i);return d;});
  const totalH=(CAL_END-CAL_START)*HOUR_H;

  // Week label
  const wl=document.getElementById("calv-week-lbl");
  if(wl)wl.textContent=`${ws.getMonth()+1}월 ${ws.getDate()}일 — ${days[6].getMonth()+1}월 ${days[6].getDate()}일`;

  // Day headers
  const hdsEl=document.getElementById("calv-day-hds");
  if(hdsEl)hdsEl.innerHTML=days.map(d=>{
    const ds=fmt(d),isToday=ds===fmt(TODAY);
    const dow=d.getDay();
    const isSat=dow===6;
    const isRed=dow===0||HOLIDAYS.has(ds);
    const numColor=isToday?"":(isRed?"color:#E04040":(isSat?"color:#2878D4":""));
    const dowColor=isRed?"color:#E04040":(isSat?"color:#2878D4":"");
    return `<div class="calv-day-hd">
      <span class="calv-day-dow" style="${dowColor}">${WDAYS[(dow+6)%7]}</span>
      <span class="calv-day-num${isToday?" calv-today-num":""}" style="${numColor}">${d.getDate()}</span>
      ${HOLIDAYS.has(ds)?`<span style="font-size:7px;color:#E04040;font-weight:800">공휴일</span>`:""}
    </div>`;
  }).join("");

  // Events — animate
  const area=document.getElementById("calv-day-cols");
  if(!area)return;

  const doUpdate=()=>{
    area.innerHTML=days.map(d=>{
      const ds=fmt(d);
      const dayPosts=S.posts.filter(p=>p.date===ds);
      const events=dayPosts.map(p=>{
        const c=ct(p.type),s=st(p.status);
        const[hh,mm]=(p.time||"12:00").split(":").map(Number);
        const topPx=Math.round((hh+mm/60-CAL_START)*HOUR_H);
        const htPx=Math.max(HOUR_H*1.1,54);
        if(topPx<0||topPx>totalH)return"";
        return`<div class="calv-event" data-cid="${p.id}" style="top:${topPx}px;height:${htPx}px;background:${c.bg};border-left:3px solid ${c.color}">
          <div class="calv-event-type" style="color:${c.tc}">${c.short}</div>
          <div class="calv-event-title" style="color:${c.tc}">${esc(p.title)}</div>
          <div style="font-size:9px;font-weight:700;margin-top:2px;color:${s.dot};display:flex;align-items:center;gap:2px"><span style="width:5px;height:5px;border-radius:3px;background:${s.dot};display:inline-block;flex-shrink:0"></span>${s.label}</div>
        </div>`;
      }).join("");
      return`<div class="calv-day-col" style="height:${totalH}px">${events}</div>`;
    }).join("");
    // Rebind event clicks
    document.querySelectorAll(".calv-event").forEach(el=>el.addEventListener("click",()=>{
      haptic("light");
      const p=S.posts.find(x=>x.id===+el.dataset.cid);
      if(!p)return;
      // Close calv overlay and navigate to that date in day view
      const ov=document.getElementById("calv-overlay");
      ov.style.transform="translateY(100%)";
      setTimeout(()=>{
        document.getElementById("calv-root")?.remove();
        S.selDate=p.date;
        save();
        S.tab=0;
        rMain();
        rTabs();
        // After render, scroll day page to that date smoothly
        requestAnimationFrame(()=>requestAnimationFrame(()=>{
          const psEl=document.getElementById("ps");
          const selPage=psEl?.querySelector(`[data-page-ds="${p.date}"]`);
          if(selPage&&psEl)psEl.scrollTo({left:selPage.offsetLeft,behavior:"smooth"});
          document.getElementById("ds")?.querySelector(".sel")?.scrollIntoView({inline:"center",behavior:"smooth"});
        }));
      },300);
    }));
  };

  if(dir===0){doUpdate();return;}
  // Horizontal slide animation
  const eventsArea=document.getElementById("calv-events-area");
  if(!eventsArea){doUpdate();return;}
  eventsArea.style.transition="transform .18s ease,opacity .18s";
  eventsArea.style.transform=`translateX(${dir>0?"-36px":"36px"})`;
  eventsArea.style.opacity="0";
  setTimeout(()=>{
    eventsArea.style.transition="none";
    eventsArea.style.transform=`translateX(${dir>0?"36px":"-36px"})`;
    doUpdate();
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      eventsArea.style.transition="transform .22s ease,opacity .22s";
      eventsArea.style.transform="translateX(0)";
      eventsArea.style.opacity="1";
    }));
  },180);
}

          <div style="padding:14px 14px 12px;background:${urg.color}0D;display:flex;align-items:flex-start;gap:10px">

      handle.addEventListener("touchstart",e=>{fsy=e.touches[0].clientY;fcy=0;factive=true;div.style.transition="none";},{passive:true});

  renderRows();
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    div.style.transform="translateY(0)";
    document.body.style.overflow="hidden"; // lock background

}

/* ─── KEYWORD EXTRACTOR ─── */
function extractKeywords(text){
  if(!text||text.length<10)return[];
  // Extract meaningful Korean/English tokens
  const stopKo=new Set(["이","가","을","를","은","는","에","의","와","과","도","로","으로","에서","했","하고","하는","하면","있는","있어","그리고","때문","하지만","그래서","같은","같이","이런","저런","이것","저것","때","더","수","않","없","있","한","것","들","때","후","전","중","동안","보다","위해","되는","되고","할","할수","해야","하면서","통해","이후","이전","또한","특히","예를","들어"]);
  const stopEn=new Set(["the","a","an","is","are","was","were","be","been","being","have","has","had","do","does","did","will","would","could","should","may","might","can","to","of","in","on","at","for","with","by","from","up","about","into","through","after","i","you","we","they","it","this","that","and","or","but","if","so","as","all","not","more","also","just"]);

  const words=text.replace(/[^\w가-힣\s]/g,' ').split(/\s+/).filter(w=>w.length>1);
  const freq={};
  words.forEach(w=>{
    const lw=w.toLowerCase();
    if(stopKo.has(lw)||stopEn.has(lw)||lw.length<2)return;
    if(/^\d+$/.test(lw))return;
    freq[w]=(freq[w]||0)+1;
  });
  // Also extract patterns like tool names, numbers, important phrases
  const patterns=[
    ...text.match(/Premiere Pro|CapCut|AI음성|릴스|캐러셀|숏츠|미드폼|인스타그램|유튜브|Snow|Canva|BlueStacks/g)||[],
    ...text.match(/[0-9]+가지|[0-9]+개|[0-9]+분/g)||[],
  ];
  patterns.forEach(p=>{freq[p]=(freq[p]||0)+3;});

  return Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,6).map(e=>e[0]);
}

  document.getElementById("ai-close").addEventListener("click",()=>{
    haptic("light");
    document.getElementById("ai-overlay").style.transform="translateY(100%)";
    setTimeout(()=>div.remove(),320);
  });

  const inp=document.getElementById("ai-inp");
  // Auto-resize textarea
  inp.addEventListener("input",()=>{inp.style.height="auto";inp.style.height=Math.min(inp.scrollHeight,100)+"px";});
  inp.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendAIMessage();}});
  document.getElementById("ai-send").addEventListener("click",sendAIMessage);
}

async function sendAIMessage(){
  const inp=document.getElementById("ai-inp");
  const msg=inp?.value.trim();
  if(!msg)return;
  haptic("tap");
  inp.value="";inp.style.height="auto";

  // Add user message
  addAIMessage(msg,"user");
  aiChatHistory.push({role:"user",content:msg});

  // Thinking indicator
  const thinkId="think-"+Date.now();
  addAIMessage("생각 중...","ai",thinkId,true);

  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":localStorage.getItem("bf_api_key")||"",
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({
        model:"claude-haiku-4-5-20251001",
        max_tokens:1000,
        system:AI_SYSTEM,
        messages:aiChatHistory
      })
    });
    const data=await res.json();
    if(!res.ok){
      const errMsg=data?.error?.message||`HTTP ${res.status}`;
      document.getElementById(thinkId)?.remove();
      addAIMessage(`오류: ${errMsg}`,"ai");
      return;
    }
    const reply=data.content?.[0]?.text||"응답을 받지 못했어요.";

    // Remove thinking
    document.getElementById(thinkId)?.remove();
    aiChatHistory.push({role:"assistant",content:reply});

    // Check for content JSON
    const jsonMatch=reply.match(/---CONTENT_JSON---\s*([\s\S]*?)\s*---END_JSON---/);
    const cleanReply=reply.replace(/---CONTENT_JSON---[\s\S]*?---END_JSON---/,"").trim();

    addAIMessage(cleanReply,"ai");

    if(jsonMatch){
      try{
        const cData=JSON.parse(jsonMatch[1]);
        addAIAddCard(cData);
      }catch(e){console.error("JSON parse error",e);}
    }
  }catch(e){
    document.getElementById(thinkId)?.remove();
    addAIMessage("API 연결 오류가 발생했어요. 잠시 후 다시 시도해주세요. 😅","ai");
  }
}

function addAIMessage(text,role,id,isThinking){

  // Convert newlines to <br>
  div.innerHTML=esc(text).replace(/\n/g,"<br>");

function lev(a,b){
  if(!a)return b.length;if(!b)return a.length;
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i?j?0:i:j));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function fuzzyScore(field,query){
  if(!field||!query)return 0;
  const f=String(field).toLowerCase(),q=query.toLowerCase();
  if(f===q)return 100;
  if(f.includes(q))return 80;
  const words=f.split(/\s+/);
  for(const w of words){if(w.startsWith(q))return 70;if(w.includes(q))return 60;}
  const qw=q.split(/\s+/).filter(x=>x.length>1);
  let hits=0;for(const w of qw){if(f.includes(w))hits++;}
  if(hits===qw.length&&qw.length>0)return 55;
  if(hits>0)return 30+hits*10;
  if(q.length<=3)return 0;
  const maxD=q.length<=5?1:q.length<=8?2:3;
  if(lev(q,f.slice(0,q.length+2))<=maxD)return 30;
  for(const w of words){if(w.length>2&&lev(q,w)<=maxD)return 25;}
  return 0;
}
function highlight(text,query){
  if(!query||!text)return esc(text);
  const t=String(text),q=query.toLowerCase();
  const idx=t.toLowerCase().indexOf(q);
  if(idx>=0)return esc(t.slice(0,idx))+`<mark style="background:transparent;font-weight:900;text-decoration:underline;text-underline-offset:2px;color:inherit">${esc(t.slice(idx,idx+q.length))}</mark>`+esc(t.slice(idx+q.length));
  return esc(text);
}
function openSearch(){
  document.getElementById("srch-root")?.remove();
  const root=document.getElementById("R-modal");
  const div=document.createElement("div");div.id="srch-root";
  div.innerHTML=`<div class="srch-overlay" id="srch-overlay" style="transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1)">
    <div class="srch-top">
      <div class="srch-inp-box">
        <span style="font-size:16px;opacity:.5;flex-shrink:0">🔍</span>
        <input class="srch-inp" id="srch-inp" placeholder="제목, 메모, 타입, 상태, 날짜..." autocomplete="off" spellcheck="false">
        <button id="srch-clear" style="display:none;padding:2px 6px;border:none;background:transparent;font-size:15px;color:#aaa;cursor:pointer">✕</button>
      </div>
      <button class="srch-cancel" id="srch-cancel">취소</button>
    </div>

  </div>`;
  root.appendChild(div);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.getElementById("srch-overlay").style.transform="translateY(0)";

  }));
  const close=()=>{

  };
  document.getElementById("srch-cancel").addEventListener("click",()=>{haptic("light");close();});
  document.getElementById("srch-clear").addEventListener("click",()=>{

  });
  let deb=null;
  document.getElementById("srch-inp").addEventListener("input",e=>{
    document.getElementById("srch-clear").style.display=e.target.value?"block":"none";

  renderSR("");

function renderSR(query){
  const res=document.getElementById("srch-results");if(!res)return;
  const q=query.trim();
  if(!q){
    const tips=["촬영완료","편집중","업로드대기","완료","기획","릴스","캐러셀","숏츠","Instagram","YouTube","AI음성","Premiere Pro"];
    const recent=S.posts.filter(p=>p.status!=="done").slice(0,3);
    res.innerHTML=`<div style="font-size:12px;font-weight:700;margin:6px 0 10px" class="mu">빠른 검색어</div>
      <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px">${tips.map(t=>`<button data-tip="${t}" style="padding:6px 13px;border-radius:20px;font-size:13px;font-weight:700;border:none;cursor:pointer" class="btn-g">${t}</button>`).join("")}</div>
      ${recent.length?`<div style="font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px" class="mu">진행중 콘텐츠</div>${recent.map(p=>buildSRCard(p,"","post")).join("")}`:""}`;
    res.querySelectorAll("[data-tip]").forEach(el=>el.addEventListener("click",()=>{
      const inp=document.getElementById("srch-inp");if(inp){inp.value=el.dataset.tip;inp.dispatchEvent(new Event("input"));document.getElementById("srch-clear").style.display="block";}
    }));
    bindSRClicks(res);return;
  }
  const pRes=S.posts.map(p=>{
    const c=ct(p.type),s=st(p.status);
    const sc=Math.max(
      fuzzyScore(p.title,q)*2.5,fuzzyScore(p.memo,q)*2,
      fuzzyScore(c.label,q)*1.5,fuzzyScore(s.label,q)*1.5,
      fuzzyScore(c.platform,q),fuzzyScore("instagram인스타그램",q),fuzzyScore("youtube유튜브",q),
      fuzzyScore(p.date,q),fuzzyScore(p.time,q),
      ...c.tools.map(t=>fuzzyScore(t,q)),
      p.aiVoice?fuzzyScore("ai음성",q):0
    );
    return{...p,_sc:sc,_kind:"post"};
  }).filter(p=>p._sc>=10).sort((a,b)=>b._sc-a._sc);
  const iRes=S.ideas.map(i=>{
    const c=ct(i.type||"routine_carousel");
    const sc=Math.max(fuzzyScore(i.text,q)*2.5,fuzzyScore(i.memo||"",q)*2,fuzzyScore(c.label,q),fuzzyScore(c.platform,q));
    return{...i,_sc:sc,_kind:"idea"};
  }).filter(i=>i._sc>=10).sort((a,b)=>b._sc-a._sc);
  if(!pRes.length&&!iRes.length){
    res.innerHTML=`<div style="text-align:center;padding:60px 24px;opacity:.5">
      <div style="font-size:52px;margin-bottom:14px">🔍</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:6px">"${esc(q)}" 검색 결과 없음</div>
      <div style="font-size:13px">오타가 있거나 다른 표현을 써봐요</div>
    </div>`;return;
  }
  let html=`<div style="font-size:12px;font-weight:600;margin:6px 0 12px;opacity:.6">${pRes.length+iRes.length}개 결과</div>`;
  if(pRes.length)html+=`<div style="font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin:12px 0 8px;display:flex;align-items:center;gap:6px" class="mu">콘텐츠 <span style="background:#444;color:#ccc;border-radius:5px;padding:1px 6px;font-size:9px" class="s1">${pRes.length}</span></div>`+pRes.slice(0,15).map(p=>buildSRCard(p,q,"post")).join("");
  if(iRes.length)html+=`<div style="font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;gap:6px" class="mu">아이디어 <span style="background:#444;color:#ccc;border-radius:5px;padding:1px 6px;font-size:9px" class="s1">${iRes.length}</span></div>`+iRes.slice(0,6).map(i=>buildSRCard(i,q,"idea")).join("");
  res.innerHTML=html;bindSRClicks(res);
}
function buildSRCard(item,q,kind){
  if(kind==="post"){
    const c=ct(item.type),s=st(item.status);
    const ml=item.memo?item.memo.split('\n')[0].slice(0,70):"";
    return`<div class="s1" data-sr-post="${item.id}" style="padding:12px 14px;border-radius:14px;margin-bottom:8px;cursor:pointer;transition:transform .1s;border:1px solid transparent" ontouchstart="this.style.transform='scale(.97)'" ontouchend="this.style.transform=''">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px">
        <div style="font-size:15px;font-weight:700;letter-spacing:-.3px;flex:1;min-width:0;line-height:1.3">${highlight(item.title,q)}</div>
        <span style="padding:4px 9px;border-radius:8px;font-size:11px;font-weight:800;flex-shrink:0;background:${s.bg};color:${s.tc}">${s.label}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:${ml?'6px':'0'};flex-wrap:wrap">${platformBadge(c.platform,"sm")} <span style="font-size:11px;font-weight:500;opacity:.65;margin-left:2px">${c.label} · ${item.date} · ${item.time}</span></div>
      ${ml?`<div style="font-size:11px;padding:5px 9px;border-radius:7px;background:${c.color}12;color:${c.color};font-weight:500;line-height:1.5">${highlight(ml,q)}${item.memo.length>70?"…":""}</div>`:""}
    </div>`;
  }else{
    const c=ct(item.type||"routine_carousel");
    const ml=item.memo?item.memo.split('\n')[0].slice(0,70):"";
    return`<div class="s1" data-sr-idea="${item.id}" style="padding:12px 14px;border-radius:14px;margin-bottom:8px;cursor:pointer;transition:transform .1s;border:1px solid transparent" ontouchstart="this.style.transform='scale(.97)'" ontouchend="this.style.transform=''">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px">
        <div style="font-size:15px;font-weight:700;letter-spacing:-.3px;flex:1">${highlight(item.text,q)}</div>
        ${platformBadge(c.platform,"sm")}
      </div>
      <div style="font-size:12px;font-weight:700;color:${c.color};margin-bottom:${ml?'6px':'0'}">${c.label}</div>
      ${ml?`<div style="font-size:11px;padding:5px 9px;border-radius:7px;background:${c.color}12;color:${c.color};font-weight:500;line-height:1.5">${highlight(ml,q)}${item.memo&&item.memo.length>70?"…":""}</div>`:""}
    </div>`;
  }
}
function bindSRClicks(container){
  container.querySelectorAll("[data-sr-post]").forEach(el=>el.addEventListener("click",()=>{
    haptic("light");const id=+el.dataset.srPost;const p=S.posts.find(x=>x.id===id);if(!p)return;
    S.selDate=p.date;save();
    document.getElementById("srch-overlay").style.transform="translateY(100%)";
    setTimeout(()=>{document.getElementById("srch-root")?.remove();S.tab=0;rMain();rTabs();
      setTimeout(()=>{const ps=document.getElementById("ps");const pg=ps?.querySelector(`[data-page-ds="${p.date}"]`);if(pg&&ps)ps.scrollTo({left:pg.offsetLeft,behavior:"smooth"});openModal("edit",{...p});},300);
    },300);
  }));
  container.querySelectorAll("[data-sr-idea]").forEach(el=>el.addEventListener("click",()=>{
    haptic("light");document.getElementById("srch-overlay").style.transform="translateY(100%)";
    setTimeout(()=>{document.getElementById("srch-root")?.remove();S.tab=2;rMain();rTabs();},300);
  }));
}

  if(!p.has("title")&&!p.has("idea"))return;

  // 잠깐 기다렸다가 앱이 완전히 렌더된 후 실행
