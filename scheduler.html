async function sendAIMessage(){
  const inp=document.getElementById("ai-inp");
  const msg=inp?.value.trim();
  if(!msg)return;
  haptic("tap");
  inp.value="";inp.style.height="auto";

  // "n번 등록해줘" 패턴 감지 — 더 유연하게
  const registerMatch=msg.match(/(\d+)\s*번.*?등록/);
  const allRegisterMatch=msg.match(/(?:전체|다|모두|전부).*?등록|등록.*?(?:전체|다|모두|전부)/);

  addAIMessage(msg,"user");
  aiChatHistory.push({role:"user",content:msg});

  const thinkId="think-"+Date.now();
  addAIMessage("생각 중...","ai",thinkId,true);

  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":localStorage.getItem("bf_api_key")||"",
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({
        model:"claude-haiku-4-5-20251001",
        max_tokens:3000,
        system:AI_SYSTEM,
        messages:aiChatHistory
      })
    });
    const data=await res.json();
    if(!res.ok){
      const errMsg=data?.error?.message||`HTTP ${res.status}`;
      document.getElementById(thinkId)?.remove();
      addAIMessage(`오류: ${errMsg}`,"ai");
      return;
    }
    const reply=data.content?.[0]?.text||"응답을 받지 못했어요.";

    // Track token usage
    const usage=data.usage||{input_tokens:0,output_tokens:0};
    aiTotalIn+=(usage.input_tokens||0);
    aiTotalOut+=(usage.output_tokens||0);
    saveTokens();updateUsageBadge();
    const msgCost=calcCost(usage.input_tokens||0,usage.output_tokens||0);
    if(msgCost>0){
      const costBadge=document.createElement("div");
      costBadge.style.cssText="font-size:10px;font-weight:600;opacity:.35;text-align:right;margin-top:-6px;margin-bottom:6px;padding-right:4px";
      costBadge.textContent=`↑ 이 응답: ${fmtCost(msgCost)} (${usage.input_tokens}↓ ${usage.output_tokens}↑ 토큰)`;
      document.getElementById("ai-messages")?.appendChild(costBadge);
      document.getElementById("ai-messages").scrollTop=document.getElementById("ai-messages").scrollHeight;
    }

    // Remove thinking
    document.getElementById(thinkId)?.remove();
    // prevAI는 현재 응답 추가 전에 미리 저장 (번호 목록 추출용)
    const prevAI=aiChatHistory.filter(m=>m.role==="assistant").slice(-1)[0]?.content||"";
    aiChatHistory.push({role:"assistant",content:reply});

    // Check for content JSON
    // 유연한 파싱 — 모델이 끝 태그를 다르게 써도 대응
    const jsonMatch=reply.match(/---CONTENT_JSON---\s*([\s\S]*?)\s*---(?:END_JSON|END|JSON_END|CONTENT_JSON_END)---/);
    const multiMatch=reply.match(/---MULTI_JSON---\s*([\s\S]*?)\s*---(?:END_MULTI|MULTI|END|MULTI_END|MULTI_JSON_END)---/);
    // 마크다운 코드블록 fallback
    const mdJsonMatch=!jsonMatch&&!multiMatch?reply.match(/```json\s*([\s\S]*?)\s*```/):null;
    // 마지막 수단: MULTI_JSON 블록이 있으면 JSON 배열 추출 시도
    const rawMultiMatch=!jsonMatch&&!multiMatch&&!mdJsonMatch?reply.match(/---MULTI_JSON---\s*([\s\S]*)/):null;

    const cleanReply=reply
      .replace(/---CONTENT_JSON---[\s\S]*?---[A-Z_]+---/g,"")
      .replace(/---MULTI_JSON---[\s\S]*/,"")
      .replace(/```json[\s\S]*?```/g,"")
      .trim();

    addAIMessage(cleanReply,"ai");

    // "n번 등록해줘" 강제 처리 — JSON 없어도 대화에서 추출
    // JSON 파싱 먼저 시도
    if(multiMatch){
      try{
        const arr=JSON.parse(multiMatch[1]);
        if(Array.isArray(arr)&&arr.length>0){addAIMultiCard(arr);return;}
      }catch(e){console.error("MULTI_JSON parse error",e);}
    }
    if(jsonMatch){
      try{
        const cData=JSON.parse(jsonMatch[1]);
        addAIAddCard(cData);return;
      }catch(e){console.error("JSON parse error",e);}
    }
    if(rawMultiMatch){
      try{
        const arrStr=rawMultiMatch[1].trim().match(/(\[[\s\S]*\])/)?.[1];
        if(arrStr){const arr=JSON.parse(arrStr);if(Array.isArray(arr)&&arr.length>0){addAIMultiCard(arr);return;}}
      }catch(e){console.error("RAW MULTI parse error",e);}
    }
    if(mdJsonMatch){
      try{
        const parsed=JSON.parse(mdJsonMatch[1]);
        if(Array.isArray(parsed)){addAIMultiCard(parsed);return;}
        else{addAIAddCard(parsed);return;}
      }catch(e){console.error("MD JSON parse error",e);}
    }

    // JSON 없을 때만 강제 등록 시도
    if(registerMatch||allRegisterMatch){
      const allAIText=aiChatHistory
        .filter(m=>m.role==="assistant")
        .map(m=>m.content)
        .join("\n")+"\n"+cleanReply;
      const allLines=allAIText.split(/\n/);
      const numbered=allLines.map(l=>{
        const trimmed=l.trim();
        if(/^\*\*\d+[).]/.test(trimmed))return null;
        if(/^-\s+[\[\]A-Z][).]/.test(trimmed))return null;
        if(/\(.*\d.*\)/.test(trimmed)&&!trimmed.match(/^\d+[.]\s/))return null;
        const m=trimmed.match(/^(\d+)[.]\s+(.{4,60})$/)
          ||trimmed.match(/^##\s+(\d+)\s+\*{0,2}(.{4,60})\*{0,2}$/);
        return m?{num:+m[1],title:m[2].replace(/^["*\s]+|["*\s]+$/g,"").trim()}:null;
      }).filter(x=>x&&x.title.length>3);
      const seen=new Set();
      const uniq=numbered.filter(x=>{if(seen.has(x.num))return false;seen.add(x.num);return true;});

      const typeGuess=(s)=>s.includes("숏츠")||s.includes("shorts")?"shorts":
        s.includes("릴스")||s.includes("reels")?"reels1":
        s.includes("캐러셀")||s.includes("carousel")?"routine_carousel":
        s.includes("미드폼")||s.includes("midform")?"midform":"shorts";
      const allText=msg+allAIText;

      if(allRegisterMatch&&uniq.length>0){
        const arr=uniq.map(x=>({title:x.title,type:typeGuess(allText),memo:"",aiVoice:typeGuess(allText)==="shorts"}));
        addAIMultiCard(arr);return;
      }else if(registerMatch){
        const targetNum=+registerMatch[1];
        const found=uniq.find(x=>x.num===targetNum);
        if(found){
          addAIAddCard({title:found.title,type:typeGuess(allText),memo:"",aiVoice:typeGuess(allText)==="shorts"});
          return;
        }
      }

      // 못 찾으면 API 재호출로 추출
      toast("🔄 AI에게 다시 확인 중...");
      try{
        const extractPrompt=registerMatch
          ?`위 대화에서 ${registerMatch[1]}번 항목의 제목만 골라서 아래 JSON 형식으로만 답해. 다른 말 하지 마:\n{"title":"제목","type":"shorts","memo":"","aiVoice":true}`
          :`위 대화의 모든 번호 항목을 골라서 아래 JSON 배열 형식으로만 답해. 다른 말 하지 마:\n[{"title":"제목","type":"shorts","memo":"","aiVoice":true}]`;
        const extractRes=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":localStorage.getItem("bf_api_key")||"","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({
            model:"claude-haiku-4-5-20251001",
            max_tokens:300,
            messages:[...aiChatHistory,{role:"user",content:extractPrompt}]
          })
        });
        const extractData=await extractRes.json();
        const extractText=extractData.content?.[0]?.text||"";
        const clean=extractText.replace(/```json|```/g,"").trim();
        if(clean.startsWith("[")){
          const arr=JSON.parse(clean);
          if(Array.isArray(arr)&&arr.length>0){addAIMultiCard(arr);return;}
        }else if(clean.startsWith("{")){
          const obj=JSON.parse(clean);
          addAIAddCard(obj);return;
        }
      }catch(e){
        toast("⚠️ 등록 실패 — '주제 목록 주고 등록카드 만들어줘'로 다시 시도해주세요");
      }
    }

  }catch(e){
    document.getElementById(thinkId)?.remove();
    addAIMessage("API 연결 오류가 발생했어요. 잠시 후 다시 시도해주세요. 😅","ai");
  }
}

function addAIMessage(text,role,id,isThinking){
  const msgs=document.getElementById("ai-messages");if(!msgs)return;
  const div=document.createElement("div");
  if(id)div.id=id;
  div.className=`ai-msg ai-msg-${role}${isThinking?" ai-msg-thinking":""}`;
  div.innerHTML=esc(text).replace(/\n/g,"<br>");
  msgs.appendChild(div);

  // AI 응답에는 항상 "등록하기" 버튼 추가
  if(role==="ai"&&!isThinking&&text.length>10){
    const btnWrap=document.createElement("div");
    btnWrap.style.cssText="display:flex;gap:6px;margin:4px 0 8px 0";
    btnWrap.innerHTML=`
      <button class="ai-quick-reg btn-p" style="padding:7px 14px;border-radius:10px;font-size:12px;font-weight:800;border:none;cursor:pointer">📅 콘텐츠 등록</button>
      <button class="ai-quick-idea btn-g" style="padding:7px 14px;border-radius:10px;font-size:12px;font-weight:700;border:none;cursor:pointer">💡 아이디어 저장</button>`;
    msgs.appendChild(btnWrap);

    btnWrap.querySelector(".ai-quick-reg").addEventListener("click",()=>{
      haptic("medium");
      openAIQuickRegister(text,"content");
    });
    btnWrap.querySelector(".ai-quick-idea").addEventListener("click",()=>{
      haptic("tap");
      openAIQuickRegister(text,"idea");
    });
  }

  msgs.scrollTop=msgs.scrollHeight;
}

function openAIQuickRegister(aiText, mode){
  // 텍스트에서 첫 번째 의미있는 제목 추출 시도
  let guessTitle="";
  const lines=aiText.split('\n');
  for(const l of lines){
    const t=l.trim().replace(/^[*#>\-\d.)[\] ]+/,"").replace(/\*+/g,"").trim();
    if(t.length>4&&t.length<60&&!/^[가-힣]{1,2}[:：]/.test(t)){
      guessTitle=t;break;
    }
  }
  const guessType=aiText.includes("숏츠")||aiText.includes("shorts")?"shorts":
    aiText.includes("릴스")||aiText.includes("reels")?"reels1":
    aiText.includes("캐러셀")||aiText.includes("carousel")?"routine_carousel":"shorts";

  const div=document.createElement("div");
  div.id="ai-qr-root";
  div.style.cssText="position:fixed;inset:0;z-index:300;display:flex;align-items:flex-end;justify-content:center";
  div.innerHTML=`
    <div style="position:absolute;inset:0;background:rgba(0,0,0,.5)" id="ai-qr-dim"></div>
    <div id="ai-qr-sheet" style="position:relative;width:100%;max-width:430px;border-radius:24px 24px 0 0;padding:20px 20px 44px;z-index:1;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)" class="sheet-bg">
      <div style="font-size:17px;font-weight:900;margin-bottom:16px">${mode==="content"?"📅 콘텐츠 등록":"💡 아이디어 저장"}</div>
      <div style="font-size:12px;font-weight:700;opacity:.5;margin-bottom:6px">제목</div>
      <input id="ai-qr-title" class="fi" style="font-size:14px;margin-bottom:12px" value="${esc(guessTitle)}" placeholder="제목 입력...">
      <div style="font-size:12px;font-weight:700;opacity:.5;margin-bottom:6px">타입</div>
      <select id="ai-qr-type" class="fi" style="font-size:13px;margin-bottom:16px">
        ${Object.entries(CT).map(([k,v])=>`<option value="${k}" ${k===guessType?"selected":""}>${v.label}</option>`).join("")}
      </select>
      <div style="display:flex;gap:8px">
        <button id="ai-qr-cancel" class="btn-g" style="flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:700;border:none;cursor:pointer">취소</button>
        <button id="ai-qr-save" class="btn-p" style="flex:2;padding:12px;border-radius:12px;font-size:14px;font-weight:900;border:none;cursor:pointer">저장</button>
      </div>
    </div>`;
  document.body.appendChild(div);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.getElementById("ai-qr-sheet").style.transform="translateY(0)";
    setTimeout(()=>document.getElementById("ai-qr-title")?.focus(),350);
  }));

  const close=()=>{document.getElementById("ai-qr-sheet").style.transform="translateY(100%)";setTimeout(()=>div.remove(),300);};
  document.getElementById("ai-qr-dim").addEventListener("click",close);
  document.getElementById("ai-qr-cancel").addEventListener("click",close);
  document.getElementById("ai-qr-save").addEventListener("click",()=>{
    const title=document.getElementById("ai-qr-title").value.trim();
    const type=document.getElementById("ai-qr-type").value;
    if(!title){toast("제목을 입력해주세요");return;}
    haptic("success");
    // 전체 AI 응답을 메모에 저장
    const fullMemo=aiText.replace(/---CONTENT_JSON---[\s\S]*?---END_JSON---/g,"")
      .replace(/---MULTI_JSON---[\s\S]*?---END_MULTI---/g,"").trim();
    if(mode==="idea"){
      S.ideas.push({id:S.nextId++,text:title,type,memo:fullMemo});
      save();rMetrics();if(S.tab===2)rIdeas();
      toast("💡 아이디어 저장됐어요!");
      close();
    }else{
      close();
      setTimeout(()=>openModal("add",{id:null,type,title,status:"idea",date:nowFmt(),time:nowTime(),memo:fullMemo,aiVoice:ct(type).aiDef,pinned:false}),320);
    }
  });
}

function addAIMultiCard(arr){
  const msgs=document.getElementById("ai-messages");if(!msgs)return;
  const div=document.createElement("div");
  div.style.cssText="border-radius:16px;overflow:hidden;border:1.5px solid rgba(128,128,128,.2)";
  div.innerHTML=`
    <div style="padding:12px 14px 8px;display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:13px;font-weight:800">총 ${arr.length}개 콘텐츠</div>
      <div style="font-size:11px;font-weight:600;opacity:.6">아래에서 선택하거나 전체 저장</div>
    </div>
    ${arr.map((item,i)=>{
      const c=ct(item.type||"routine_carousel");
      return`<div style="padding:10px 14px;border-top:1px solid rgba(128,128,128,.1);display:flex;align-items:center;gap:10px">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:800;margin-bottom:2px">${esc(item.title)}</div>
          <div style="display:flex;gap:5px;align-items:center">${platformBadge(c.platform,"sm")} <span style="font-size:10px;color:${c.color};font-weight:700">${c.label}</span></div>
        </div>
        <button data-multi-idx="${i}" style="padding:5px 10px;border-radius:8px;font-size:11px;font-weight:800;border:none;background:${c.color}20;color:${c.color};cursor:pointer">💡저장</button>
      </div>`;
    }).join("")}
    <div style="padding:10px 14px;border-top:1px solid rgba(128,128,128,.1);display:flex;gap:8px">
      <button id="multi-all-idea" style="flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:800;border:none;cursor:pointer" class="btn-g">💡 전체 아이디어 저장</button>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;

  // 개별 저장
  div.querySelectorAll("[data-multi-idx]").forEach(btn=>btn.addEventListener("click",()=>{
    const item=arr[+btn.dataset.multiIdx];
    haptic("save");
    S.ideas.push({id:S.nextId++,text:item.title,type:item.type||"routine_carousel",memo:item.memo||""});
    save();rMetrics();
    btn.textContent="✓ 저장됨";btn.disabled=true;btn.style.opacity="0.5";
    toast("💡 아이디어 저장됐어요!");
  }));

  // 전체 저장
  div.querySelector("#multi-all-idea").addEventListener("click",()=>{
    haptic("success");
    arr.forEach(item=>{
      S.ideas.push({id:S.nextId++,text:item.title,type:item.type||"routine_carousel",memo:item.memo||""});
    });
    save();rMetrics();
    div.querySelectorAll("[data-multi-idx]").forEach(btn=>{btn.textContent="✓";btn.disabled=true;btn.style.opacity="0.5";});
    div.querySelector("#multi-all-idea").textContent=`✓ ${arr.length}개 전체 저장됨`;
    div.querySelector("#multi-all-idea").disabled=true;
    toast(`💡 ${arr.length}개 아이디어 저장됐어요!`);
  });
}

function addAIAddCard(cData){
  const msgs=document.getElementById("ai-messages");if(!msgs)return;
  const c=ct(cData.type||"routine_carousel");
  const div=document.createElement("div");
  div.className="ai-add-card";
  div.style.borderColor=c.color;
  div.innerHTML=`
    <div class="ai-add-header" style="background:${c.bg}">
      <div>
        <div class="ai-add-title" style="color:${c.tc}">${esc(cData.title)}</div>
        <div style="margin-top:4px;display:flex;gap:5px;align-items:center">
          ${platformBadge(c.platform,"sm")}
          <span class="ai-add-type" style="background:${c.color}20;color:${c.color}">${c.label}</span>
        </div>
      </div>
      <div style="font-size:28px">${c.platform==="youtube"?"🎬":"📸"}</div>
    </div>
    <div style="display:flex;gap:8px;padding:8px">
      <button class="ai-add-btn" id="ai-save-idea" style="flex:1;background:${c.color}18;color:${c.color};border-radius:10px;font-weight:800;font-size:13px;padding:10px">💡 아이디어 저장</button>
      <button class="ai-add-btn btn-p" id="ai-add-now" style="flex:1;border-radius:10px;font-size:13px;padding:10px">📅 콘텐츠 등록</button>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;

  // 아이디어로 바로 저장
  div.querySelector("#ai-save-idea").addEventListener("click",()=>{
    haptic("save");
    S.ideas.push({
      id:S.nextId++,
      text:cData.title||"",
      type:cData.type||"routine_carousel",
      memo:cData.memo||""
    });
    save();rMetrics();
    toast("💡 아이디어 보관함에 저장됐어요!");
    // 버튼 비활성화
    div.querySelector("#ai-save-idea").textContent="✓ 저장됨";
    div.querySelector("#ai-save-idea").disabled=true;
    div.querySelector("#ai-save-idea").style.opacity="0.5";
  });

  // 콘텐츠로 등록 (모달 오픈)
  div.querySelector("#ai-add-now").addEventListener("click",()=>{
    haptic("success");
    document.getElementById("ai-overlay").style.transform="translateY(100%)";
    setTimeout(()=>{
      document.getElementById("ai-root")?.remove();
      openModal("add",{
        id:null,
        type:cData.type||"routine_carousel",
        title:cData.title||"",
        status:"idea",
        date:nowFmt(),
        time:nowTime(),
        memo:cData.memo||"",
        aiVoice:cData.aiVoice||ct(cData.type||"routine_carousel").aiDef,
        pinned:false
      });
    },320);
    toast("📅 콘텐츠 등록 화면 열었어요!");
  });
}
function lev(a,b){
  if(!a)return b.length;if(!b)return a.length;
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i?j?0:i:j));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function fuzzyScore(field,query){
  if(!field||!query)return 0;
  const f=String(field).toLowerCase(),q=query.toLowerCase();
  if(f===q)return 100;
  if(f.includes(q))return 80;
  const words=f.split(/\s+/);
  for(const w of words){if(w.startsWith(q))return 70;if(w.includes(q))return 60;}
  const qw=q.split(/\s+/).filter(x=>x.length>1);
  let hits=0;for(const w of qw){if(f.includes(w))hits++;}
  if(hits===qw.length&&qw.length>0)return 55;
  if(hits>0)return 30+hits*10;
  if(q.length<=3)return 0;
  const maxD=q.length<=5?1:q.length<=8?2:3;
  if(lev(q,f.slice(0,q.length+2))<=maxD)return 30;
  for(const w of words){if(w.length>2&&lev(q,w)<=maxD)return 25;}
  return 0;
}
function highlight(text,query){
  if(!query||!text)return esc(text);
  const t=String(text),q=query.toLowerCase();
  const idx=t.toLowerCase().indexOf(q);
  if(idx>=0)return esc(t.slice(0,idx))+`<mark style="background:transparent;font-weight:900;text-decoration:underline;text-underline-offset:2px;color:inherit">${esc(t.slice(idx,idx+q.length))}</mark>`+esc(t.slice(idx+q.length));
  return esc(text);
}
function openSearch(){
  document.getElementById("srch-root")?.remove();
  const root=document.getElementById("R-modal");
  const div=document.createElement("div");div.id="srch-root";
  div.innerHTML=`<div class="srch-overlay" id="srch-overlay" style="transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1)">
    <div class="srch-top">
      <div class="srch-inp-box">
        <span style="font-size:16px;opacity:.5;flex-shrink:0">🔍</span>
        <input class="srch-inp" id="srch-inp" placeholder="제목, 메모, 타입, 상태, 날짜..." autocomplete="off" spellcheck="false">
        <button id="srch-clear" style="display:none;padding:2px 6px;border:none;background:transparent;font-size:15px;color:#aaa;cursor:pointer">✕</button>
      </div>
      <button class="srch-cancel" id="srch-cancel">취소</button>
    </div>
    <div class="srch-results" id="srch-results"></div>
  </div>`;
  root.appendChild(div);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.getElementById("srch-overlay").style.transform="translateY(0)";
    setTimeout(()=>document.getElementById("srch-inp")?.focus(),350);
  }));
  const close=()=>{
    document.getElementById("srch-overlay").style.transform="translateY(100%)";
    unlockBody();
    setTimeout(()=>div.remove(),320);
  };
  document.getElementById("srch-cancel").addEventListener("click",()=>{haptic("light");close();});
  document.getElementById("srch-clear").addEventListener("click",()=>{
    const inp=document.getElementById("srch-inp");inp.value="";inp.focus();
    document.getElementById("srch-clear").style.display="none";renderSR("");
  });
  let deb=null;
  document.getElementById("srch-inp").addEventListener("input",e=>{
    document.getElementById("srch-clear").style.display=e.target.value?"block":"none";
    clearTimeout(deb);deb=setTimeout(()=>renderSR(e.target.value),130);
  });
  renderSR("");
}
function renderSR(query){
  const res=document.getElementById("srch-results");if(!res)return;
  const q=query.trim();
  if(!q){
    const tips=["촬영완료","편집중","업로드대기","완료","기획","릴스","캐러셀","숏츠","Instagram","YouTube","AI음성","Premiere Pro"];
    const recent=S.posts.filter(p=>p.status!=="done").slice(0,3);
    res.innerHTML=`<div style="font-size:12px;font-weight:700;margin:6px 0 10px" class="mu">빠른 검색어</div>
      <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px">${tips.map(t=>`<button data-tip="${t}" style="padding:6px 13px;border-radius:20px;font-size:13px;font-weight:700;border:none;cursor:pointer" class="btn-g">${t}</button>`).join("")}</div>
      ${recent.length?`<div style="font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px" class="mu">진행중 콘텐츠</div>${recent.map(p=>buildSRCard(p,"","post")).join("")}`:""}`;
    res.querySelectorAll("[data-tip]").forEach(el=>el.addEventListener("click",()=>{
      const inp=document.getElementById("srch-inp");if(inp){inp.value=el.dataset.tip;inp.dispatchEvent(new Event("input"));document.getElementById("srch-clear").style.display="block";}
    }));
    bindSRClicks(res);return;
  }
  const pRes=S.posts.map(p=>{
    const c=ct(p.type),s=st(p.status);
    const sc=Math.max(
      fuzzyScore(p.title,q)*2.5,fuzzyScore(p.memo,q)*2,
      fuzzyScore(c.label,q)*1.5,fuzzyScore(s.label,q)*1.5,
      fuzzyScore(c.platform,q),fuzzyScore("instagram인스타그램",q),fuzzyScore("youtube유튜브",q),
      fuzzyScore(p.date,q),fuzzyScore(p.time,q),
      ...c.tools.map(t=>fuzzyScore(t,q)),
      p.aiVoice?fuzzyScore("ai음성",q):0
    );
    return{...p,_sc:sc,_kind:"post"};
  }).filter(p=>p._sc>=10).sort((a,b)=>b._sc-a._sc);
  const iRes=S.ideas.map(i=>{
    const c=ct(i.type||"routine_carousel");
    const sc=Math.max(fuzzyScore(i.text,q)*2.5,fuzzyScore(i.memo||"",q)*2,fuzzyScore(c.label,q),fuzzyScore(c.platform,q));
    return{...i,_sc:sc,_kind:"idea"};
  }).filter(i=>i._sc>=10).sort((a,b)=>b._sc-a._sc);
  if(!pRes.length&&!iRes.length){
    res.innerHTML=`<div style="text-align:center;padding:60px 24px;opacity:.5">
      <div style="font-size:52px;margin-bottom:14px">🔍</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:6px">"${esc(q)}" 검색 결과 없음</div>
      <div style="font-size:13px">오타가 있거나 다른 표현을 써봐요</div>
    </div>`;return;
  }
  let html=`<div style="font-size:12px;font-weight:600;margin:6px 0 12px;opacity:.6">${pRes.length+iRes.length}개 결과</div>`;
  if(pRes.length)html+=`<div style="font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin:12px 0 8px;display:flex;align-items:center;gap:6px" class="mu">콘텐츠 <span style="background:#444;color:#ccc;border-radius:5px;padding:1px 6px;font-size:9px" class="s1">${pRes.length}</span></div>`+pRes.slice(0,15).map(p=>buildSRCard(p,q,"post")).join("");
  if(iRes.length)html+=`<div style="font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;gap:6px" class="mu">아이디어 <span style="background:#444;color:#ccc;border-radius:5px;padding:1px 6px;font-size:9px" class="s1">${iRes.length}</span></div>`+iRes.slice(0,6).map(i=>buildSRCard(i,q,"idea")).join("");
  res.innerHTML=html;bindSRClicks(res);
}
function buildSRCard(item,q,kind){
  if(kind==="post"){
    const c=ct(item.type),s=st(item.status);
    const ml=item.memo?item.memo.split('\n')[0].slice(0,70):"";
    return`<div class="s1" data-sr-post="${item.id}" style="padding:12px 14px;border-radius:14px;margin-bottom:8px;cursor:pointer;transition:transform .1s;border:1px solid transparent" ontouchstart="this.style.transform='scale(.97)'" ontouchend="this.style.transform=''">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px">
        <div style="font-size:15px;font-weight:700;letter-spacing:-.3px;flex:1;min-width:0;line-height:1.3">${highlight(item.title,q)}</div>
        <span style="padding:4px 9px;border-radius:8px;font-size:11px;font-weight:800;flex-shrink:0;background:${s.bg};color:${s.tc}">${s.label}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:${ml?'6px':'0'};flex-wrap:wrap">${platformBadge(c.platform,"sm")} <span style="font-size:11px;font-weight:500;opacity:.65;margin-left:2px">${c.label} · ${item.date} · ${item.time}</span></div>
      ${ml?`<div style="font-size:11px;padding:5px 9px;border-radius:7px;background:${c.color}12;color:${c.color};font-weight:500;line-height:1.5">${highlight(ml,q)}${item.memo.length>70?"…":""}</div>`:""}
    </div>`;
  }else{
    const c=ct(item.type||"routine_carousel");
    const ml=item.memo?item.memo.split('\n')[0].slice(0,70):"";
    return`<div class="s1" data-sr-idea="${item.id}" style="padding:12px 14px;border-radius:14px;margin-bottom:8px;cursor:pointer;transition:transform .1s;border:1px solid transparent" ontouchstart="this.style.transform='scale(.97)'" ontouchend="this.style.transform=''">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px">
        <div style="font-size:15px;font-weight:700;letter-spacing:-.3px;flex:1">${highlight(item.text,q)}</div>
        ${platformBadge(c.platform,"sm")}
      </div>
      <div style="font-size:12px;font-weight:700;color:${c.color};margin-bottom:${ml?'6px':'0'}">${c.label}</div>
      ${ml?`<div style="font-size:11px;padding:5px 9px;border-radius:7px;background:${c.color}12;color:${c.color};font-weight:500;line-height:1.5">${highlight(ml,q)}${item.memo&&item.memo.length>70?"…":""}</div>`:""}
    </div>`;
  }
}
function bindSRClicks(container){
  container.querySelectorAll("[data-sr-post]").forEach(el=>el.addEventListener("click",()=>{
    haptic("light");const id=+el.dataset.srPost;const p=S.posts.find(x=>x.id===id);if(!p)return;
    S.selDate=p.date;save();
    document.getElementById("srch-overlay").style.transform="translateY(100%)";
    setTimeout(()=>{document.getElementById("srch-root")?.remove();S.tab=0;rMain();rTabs();
      setTimeout(()=>{const ps=document.getElementById("ps");const pg=ps?.querySelector(`[data-page-ds="${p.date}"]`);if(pg&&ps)ps.scrollTo({left:pg.offsetLeft,behavior:"smooth"});openModal("edit",{...p});},300);
    },300);
  }));
  container.querySelectorAll("[data-sr-idea]").forEach(el=>el.addEventListener("click",()=>{
    haptic("light");document.getElementById("srch-overlay").style.transform="translateY(100%)";
    setTimeout(()=>{document.getElementById("srch-root")?.remove();S.tab=2;rMain();rTabs();},300);
  }));
}
rTopbar();rMetrics();rMain();rTabs();

// ─── URL 파라미터 자동 처리 (Claude 연동) ───
(function(){
  const p=new URLSearchParams(window.location.search);
  if(!p.has("title")&&!p.has("idea"))return;

  // 잠깐 기다렸다가 앱이 완전히 렌더된 후 실행
  setTimeout(()=>{
    if(p.has("idea")){
      // 아이디어로 추가
      const text=p.get("idea")||"";
      const type=p.get("type")||"routine_carousel";
      const memo=p.get("memo")||"";
      if(text){
        S.ideas.push({id:S.nextId++,text,type,memo});
        save();rMetrics();
        if(S.tab===2)rIdeas();
        else{switchTab(2);}
        setTimeout(()=>toast("💡 아이디어가 추가됐어요!"),400);
      }
    }else if(p.has("title")){
      // 콘텐츠로 바로 등록
      const title=p.get("title")||"";
      const type=p.get("type")||"routine_carousel";
      const memo=p.get("memo")||"";
      const status=p.get("status")||"idea";
      const date=p.get("date")||nowFmt();
      const time=p.get("time")||nowTime();
      const aiVoice=p.get("ai")==="1"||ct(type).aiDef;
      openModal("add",{id:null,type,title,status,date,time,memo,aiVoice,pinned:false});
    }
    // URL 파라미터 클린업 (히스토리에 남기지 않음)
    window.history.replaceState({},"",window.location.pathname);
  },600);
})();

// Real-time clock sync — update selDate at midnight
setInterval(()=>{
  const today=nowFmt();
  if(S.selDate!==today&&S.tab===0){
    S.selDate=today;rMain();
  }
},60000);
// Set R-main top offset to match frozen fixed header
requestAnimationFrame(()=>{
  const fixed=document.getElementById("R-fixed");
  const main=document.getElementById("R-main");
  if(fixed&&main){
    const h=fixed.getBoundingClientRect().height;
    main.style.paddingTop=h+"px";
  }
});
</script>
